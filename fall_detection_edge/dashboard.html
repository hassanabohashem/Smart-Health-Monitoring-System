<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Health — Fall Detection Demo</title>
  <meta name="description"
    content="Live interactive demo for the Smart Health Monitoring fall detection system. Submit IMU sensor data and see fall detection results in real-time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Reset & tokens ───────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --bg3: #e2e8f0;
      --card: #ffffff;
      --border: #e2e8f0;
      --border-h: #cbd5e1;
      --blue: #0ea5e9;
      --blue-g: linear-gradient(135deg, #3b82f6, #0ea5e9);
      --green: #10b981;
      --red: #ef4444;
      --red-g: linear-gradient(135deg, #ef4444, #f43f5e);
      --amber: #f59e0b;
      --text: #1e293b;
      --text-soft: #334155;
      --muted: #64748b;
      --muted2: #94a3b8;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
      --glow-blue: 0 4px 14px rgba(14, 165, 233, 0.25);
      --glow-red: 0 4px 14px rgba(239, 68, 68, 0.25);
      --glow-green: 0 4px 14px rgba(16, 185, 129, 0.2);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(14, 165, 233, 0.1) 0%, transparent 60%),
        linear-gradient(to bottom, var(--bg) 0%, var(--bg2) 100%);
    }

    /* ── Grid background ──────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 52px 0 36px;
    }

    @keyframes float-icon {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    header h1 {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    /* ── Status bar ───────────────────────────────────────────────── */
    .status-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .status-card {
      flex: 1;
      min-width: 180px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
    }

    .status-card:hover {
      border-color: var(--border-h);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
      transform: translateY(-2px);
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--border-h);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.green {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    .status-dot.red {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .status-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .threshold-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted2);
    }

    .chip.waist {
      border-color: rgba(59, 130, 246, 0.4);
      color: #93c5fd;
    }

    .chip.wrist {
      border-color: rgba(99, 102, 241, 0.4);
      color: #a5b4fc;
    }

    .chip.neck {
      border-color: rgba(168, 85, 247, 0.4);
      color: #d8b4fe;
    }

    /* ── Two-column main layout ───────────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 860px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Card base ────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: var(--border-h);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-soft);
      margin-bottom: 24px;
    }

    /* ── Placement selector ───────────────────────────────────────── */
    .section-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 12px;
    }

    .placement-pills {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .pill {
      flex: 1;
      padding: 10px 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .pill:hover {
      border-color: var(--border-h);
      background: #e2e8f0;
      color: var(--text-soft);
    }

    .pill.active-waist {
      border-color: #0ea5e9;
      background: #0ea5e9;
      color: white;
      box-shadow: var(--glow-blue);
    }

    .pill.active-wrist {
      border-color: #8b5cf6;
      background: #8b5cf6;
      color: white;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.25);
    }

    .pill.active-neck {
      border-color: #d946ef;
      background: #d946ef;
      color: white;
      box-shadow: 0 4px 14px rgba(217, 70, 239, 0.25);
    }

    /* ── Event toggle ─────────────────────────────────────────────── */
    .event-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .toggle-btn {
      flex: 1;
      padding: 11px 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .toggle-btn:hover {
      border-color: var(--border-h);
      background: #e2e8f0;
      color: var(--text-soft);
    }

    .toggle-btn.active-adl {
      border-color: var(--green);
      background: var(--green);
      color: white;
      box-shadow: var(--glow-green);
    }

    .toggle-btn.active-fall {
      border-color: var(--red);
      background: var(--red);
      color: white;
      box-shadow: var(--glow-red);
    }

    .toggle-btn.active-mode {
      border-color: var(--blue);
      background: var(--blue);
      color: white;
      box-shadow: var(--glow-blue);
    }

    /* ── Waveform preview ─────────────────────────────────────────── */
    .waveform-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.2);
      height: 80px;
      overflow: hidden;
      margin-bottom: 24px;
      position: relative;
    }

    #waveformCanvas {
      width: 100%;
      height: 100%;
    }

    .waveform-label {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Send button ──────────────────────────────────────────────── */
    #sendBtn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: var(--blue-g);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: var(--glow-blue);
      transition: all 0.2s;
    }

    #sendBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(14, 165, 233, 0.4);
    }

    #sendBtn:active {
      transform: translateY(0);
    }

    #sendBtn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    /* ── Result card ──────────────────────────────────────────────── */
    .result-card {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Arc gauge */
    .gauge-wrap {
      position: relative;
      width: 200px;
      height: 120px;
      margin: 0 auto 24px;
    }

    #gaugeCanvas {
      width: 200px;
      height: 120px;
    }

    .gauge-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 6px;
    }

    #confValue {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.4s;
      color: var(--text);
    }

    .gauge-unit {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
    }

    /* Result badge */
    #resultBadge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 24px;
      border: 1px solid transparent;
      transition: all 0.4s;
    }

    #resultBadge.fall {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #dc2626;
      box-shadow: var(--glow-red);
    }

    #resultBadge.adl {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
      color: #059669;
      box-shadow: var(--glow-green);
    }

    #resultBadge.warning {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.3);
      color: #d97706;
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.2);
    }

    #resultBadge.idle {
      background: var(--bg2);
      border-color: var(--border);
      color: var(--muted);
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
    }

    .stat-box .s-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat-box .s-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-box .s-value.blue {
      color: var(--blue);
    }

    .stat-box .s-value.green {
      color: var(--green);
    }

    .stat-box .s-value.purple {
      color: #a855f7;
    }

    .stat-box .s-value.amber {
      color: var(--amber);
    }

    .stat-box .s-value.red {
      color: var(--red);
    }

    /* wait state */
    .result-idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 280px;
      color: var(--muted);
      gap: 16px;
      font-size: 15px;
      text-align: center;
      font-weight: 500;
    }

    .result-idle svg {
      opacity: 0.4;
      color: var(--blue);
    }

    /* ── Logs ─────────────────────────────────────────────────────── */
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 36px;
      margin-bottom: 16px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .log-header h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-soft);
      font-weight: 700;
    }

    #clearLog {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color 0.18s;
    }

    #clearLog:hover {
      color: var(--red);
    }

    #logBody {
      padding: 12px;
      max-height: 240px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    #logBody::-webkit-scrollbar {
      width: 6px;
    }

    #logBody::-webkit-scrollbar-track {
      background: var(--bg);
      border-radius: 4px;
    }

    #logBody::-webkit-scrollbar-thumb {
      background: var(--border-h);
      border-radius: 4px;
    }

    .log-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
      animation: slide-in 0.2s ease;
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .log-time {
      color: var(--muted);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .log-pill {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .log-pill.fall {
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
    }

    .log-pill.adl {
      background: rgba(16, 185, 129, 0.1);
      color: var(--green);
    }

    .log-pill.idle {
      background: var(--bg2);
      color: var(--muted);
    }

    .log-detail {
      color: var(--text-soft);
      flex: 1;
    }

    .log-empty {
      text-align: center;
      color: var(--muted);
      padding: 32px 0;
      font-size: 14px;
    }

    /* ── Error toast ──────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: white;
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--red);
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 14px;
      max-width: 360px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── API URL row ──────────────────────────────────────────────── */
    .api-url-row {
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .api-url-row label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 600;
    }

    #apiUrl {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    #apiUrl:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }
  </style>
</head>

<body>
  <main>

    <!-- ── Header ───────────────────────────────────────────────────── -->
    <header>

    </header>

    <input type="hidden" id="apiUrl" value="http://localhost:8000" />
    <!-- ── Main grid ────────────────────────────────────────────────── -->
    <div class="main-grid">

      <!-- ── Left: Request builder ────────────────────────────────── -->
      <div class="card">
        <div class="card-title">Event Configuration</div>

        <div class="section-label">Sensor Placement</div>
        <div class="placement-pills" id="placementPills">
          <button class="pill active-waist" data-p="waist">Waist</button>
          <button class="pill" data-p="wrist">Wrist</button>
          <button class="pill" data-p="neck">Neck</button>
        </div>

        <div class="section-label">Scenario Data Source</div>
        <div class="event-toggle" id="eventToggle">
          <button class="toggle-btn active-adl" data-e="adl">Real ADL</button>
          <button class="toggle-btn" data-e="fall" style="border-color:rgba(239,68,68,0.3)">Real Fall</button>
        </div>


        <div class="section-label">Operation Mode</div>
        <div class="event-toggle" id="modeToggle" style="margin-bottom: 24px;">
          <button class="toggle-btn active-mode" data-m="single">Single Request</button>
          <button class="toggle-btn" data-m="stream">Continuous Stream</button>
        </div>

        <button id="sendBtn" onclick="sendRequest()">Detect Fall</button>
      </div>

      <!-- ── Right: Result display ─────────────────────────────────── -->
      <div class="card result-card">
        <div class="card-title" style="width:100%; text-align:left;">Live Result</div>

        <div id="resultIdle" class="result-idle">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          <span>Submit a request to see results</span>
        </div>

        <div id="resultPanel"
          style="display:none; width:100%; display:none; flex-direction:column; align-items:center;">
          <div class="gauge-wrap" style="transform: scale(1.2); margin-top: 10px; margin-bottom: 30px;">
            <canvas id="gaugeCanvas" width="400" height="240"></canvas>
            <div class="gauge-center">
              <div id="confValue" style="color:var(--muted)">—</div>
              <div class="gauge-unit">Confidence</div>
            </div>
          </div>

          <div id="resultBadge" class="idle">Awaiting Data</div>
        </div>
      </div>

    </div>

  </main>

  <!-- ── Error toast ────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <script>
    /* ── State ─────────────────────────────────────────────────────────── */
    let selectedPlacement = 'waist';
    let selectedEvent = 'adl';
    let waveAnim = null;
    let gaugeTarget = 0;
    let gaugeCurrent = 0;
    let gaugeAnim = null;

    /* ── Colour helpers ─────────────────────────────────────────────────── */
    const PLACEMENT_CLASS = { waist: 'active-waist', wrist: 'active-wrist', neck: 'active-neck' };
    const PLACEMENT_COLOR = { waist: '#3b82f6', wrist: '#6366f1', neck: '#a855f7' };



    /* ── Placement pills ─────────────────────────────────────────────────── */
    document.getElementById('placementPills').addEventListener('click', e => {
      const btn = e.target.closest('[data-p]');
      if (!btn) return;
      selectedPlacement = btn.dataset.p;
      document.querySelectorAll('#placementPills .pill').forEach(b => {
        b.className = 'pill' + (b.dataset.p === selectedPlacement ? ' ' + PLACEMENT_CLASS[selectedPlacement] : '');
      });

    });

    /* ── Event toggle ────────────────────────────────────────────────────── */
    document.getElementById('eventToggle').addEventListener('click', e => {
      const btn = e.target.closest('[data-e]');
      if (!btn) return;
      selectedEvent = btn.dataset.e;
      document.querySelectorAll('#eventToggle .toggle-btn').forEach(b => {
        b.className = 'toggle-btn' + (b.dataset.e === selectedEvent ? ' active-' + b.dataset.e : '');
      });
    });

    /* ── Mode toggle ─────────────────────────────────────────────────────── */
    let currentMode = 'single';
    let streamInterval = null;

    document.getElementById('modeToggle').addEventListener('click', e => {
      const btn = e.target.closest('[data-m]');
      if (!btn) return;
      currentMode = btn.dataset.m;
      document.querySelectorAll('#modeToggle .toggle-btn').forEach(b => {
        b.className = 'toggle-btn' + (b.dataset.m === currentMode ? ' active-mode' : '');
      });

      const sendBtn = document.getElementById('sendBtn');
      if (currentMode === 'stream') {
        sendBtn.innerHTML = 'Stop Stream';
        sendBtn.style.background = 'var(--red-g)';
        sendBtn.onclick = stopStream;
        startStream();
      } else {
        stopStream();
        sendBtn.innerHTML = 'Detect Fall';
        sendBtn.style.background = 'var(--blue-g)';
        sendBtn.onclick = sendRequest;
      }
    });

    function startStream() {
      if (streamInterval) clearInterval(streamInterval);
      sendRequest(); // send first one immediately
      streamInterval = setInterval(sendRequest, 350); // ~3 requests per second
    }

    function stopStream() {
      if (streamInterval) {
        clearInterval(streamInterval);
        streamInterval = null;
      }
    }

    /* ── Waveform canvas ─────────────────────────────────────────────────── */


    /* ── Gauge canvas ────────────────────────────────────────────────────── */
    function drawGauge(value, color) {
      const canvas = document.getElementById('gaugeCanvas');
      const DPR = devicePixelRatio;
      const W = 200, H = 120;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);

      const cx = W / 2, cy = H - 14;
      const r = 84;
      const startAngle = Math.PI;
      const endAngle = 2 * Math.PI;

      // track
      ctx.beginPath();
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.strokeStyle = '#e2e8f0'; // Light slate track
      ctx.lineWidth = 12;
      ctx.lineCap = 'round';
      ctx.stroke();

      // fill
      if (value > 0) {
        const fillEnd = startAngle + (endAngle - startAngle) * value;
        const grad = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
        grad.addColorStop(0, color + 'aa');
        grad.addColorStop(1, color);
        ctx.beginPath();
        ctx.arc(cx, cy, r, startAngle, fillEnd);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.shadowColor = color;
        ctx.shadowBlur = 20;
        ctx.stroke();
      }
    }

    function animateGauge(target, color) {
      if (gaugeAnim) cancelAnimationFrame(gaugeAnim);
      const start = gaugeCurrent;
      const t0 = performance.now();
      const dur = 700;
      function frame(now) {
        const p = Math.min((now - t0) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        gaugeCurrent = start + (target - start) * ease;
        drawGauge(gaugeCurrent, color);
        const cv = document.getElementById('confValue');
        cv.textContent = Math.round(gaugeCurrent * 100) + '%';
        cv.style.color = color;
        if (p < 1) gaugeAnim = requestAnimationFrame(frame);
      }
      gaugeAnim = requestAnimationFrame(frame);
    }



    /* ── Send request — uses REAL test samples from /api/v1/sample ──────────── */
    async function sendRequest() {
      const base = document.getElementById('apiUrl').value.replace(/\/$/, '');
      const btn = document.getElementById('sendBtn');

      if (currentMode === 'single') {
        btn.classList.add('loading');
        btn.textContent = 'Loading sample…';
      }

      const t0 = performance.now();

      try {
        // Fetch a real held-out test window from the API
        let sampleRes;
        sampleRes = await fetch(
          `${base}/api/v1/sample?placement=${selectedPlacement}&type=${selectedEvent}`,
          { signal: AbortSignal.timeout(8000) }
        );

        if (!sampleRes.ok) throw new Error(`Sample fetch HTTP ${sampleRes.status}`);
        const payload = await sampleRes.json();

        if (currentMode === 'single') {
          btn.textContent = 'Detecting…';
        }

        // Step 2: POST the real sample to detect_fall
        const detectRes = await fetch(`${base}/api/v1/detect_fall`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            device_id: payload.device_id,
            device_placement: payload.device_placement,
            timestamp: payload.timestamp,
            sequence: payload.sequence,
          }),
          signal: AbortSignal.timeout(10000)
        });
        const latency = performance.now() - t0;
        if (!detectRes.ok) throw new Error(`Detection HTTP ${detectRes.status}`);
        const data = await detectRes.json();

        showResult(data, latency);

      } catch (err) {
        showToast('Request failed: ' + err.message);
        if (currentMode === 'stream') stopStream();
      } finally {
        if (currentMode === 'single') {
          btn.classList.remove('loading');
          btn.innerHTML = '&#9654; &nbsp; Detect Fall';
        }
      }
    }

    /* ── Show result ────────────────────────────────────────────────── */
    function showResult(data, latencyMs) {
      document.getElementById('resultIdle').style.display = 'none';
      const panel = document.getElementById('resultPanel');
      panel.style.display = 'flex';

      const conf = data.confidence ?? 0;
      const isFall = data.is_fall;

      let color = isFall ? '#ef4444' : '#22c55e';

      animateGauge(conf, color);

      const badge = document.getElementById('resultBadge');
      if (isFall) {
        badge.className = 'fall';
        badge.style.color = '#dc2626';
        badge.style.borderColor = 'rgba(239, 68, 68, 0.3)';
        badge.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
        badge.style.boxShadow = 'var(--glow-red)';
        badge.innerHTML = 'FALL DETECTED';
      } else {
        badge.className = 'adl';
        badge.style.color = '#059669';
        badge.style.borderColor = 'rgba(16, 185, 129, 0.3)';
        badge.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
        badge.style.boxShadow = 'var(--glow-green)';
        badge.innerHTML = 'Normal Activity';
      }

      document.getElementById('confValue').innerText = (conf * 100).toFixed(1) + '%';
      document.getElementById('confValue').style.color = color;
    }




    function clearLog() {
      const body = document.getElementById('logBody');
      body.innerHTML = '<div class="log-empty" id="logEmpty">No requests yet</div>';
      document.getElementById('resultIdle').style.display = 'flex';
      document.getElementById('resultPanel').style.display = 'none';
      gaugeCurrent = 0;
    }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 4000);
    }
  </script>
